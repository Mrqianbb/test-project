server:
  port: 9000

spring:
  application:
    name: ecommerce-gateway
  main:
    web-application-type: reactive
  config:
    import: optional:nacos:ecommerce-gateway.yml
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        ip: 127.0.0.1
        port: 9000
      config:
        server-addr: localhost:8848
        file-extension: yml
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 用户服务路由
        - id: user-service
          uri: http://127.0.0.1:8001
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2

        # 商品服务路由
        - id: product-service
          uri: http://127.0.0.1:8002
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=2

        # 订单服务路由
        - id: order-service
          uri: lb://ecommerce-order
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=2

        # 支付服务路由
        - id: payment-service
          uri: lb://ecommerce-payment
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=2
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
